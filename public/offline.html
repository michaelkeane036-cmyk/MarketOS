<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#11131f" />
    <title>MarketOS Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.2rem;
        color: #f8f8f5;
        background:
          radial-gradient(circle at 12% 5%, rgba(39, 152, 98, 0.18), transparent 15rem),
          radial-gradient(circle at 100% 22%, rgba(255, 196, 95, 0.12), transparent 14rem),
          linear-gradient(160deg, rgba(20, 35, 33, 0.82), rgba(7, 9, 12, 0.96) 48%, rgba(8, 12, 14, 1)),
          #050809;
        font-family: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 430px);
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 1.35rem;
        padding: 1.1rem;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03)),
          rgba(4, 9, 10, 0.82);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.38);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.72rem;
        margin-bottom: 1.5rem;
      }

      .mark {
        width: 2.7rem;
        height: 2.7rem;
        border-radius: 0.9rem;
        display: grid;
        place-items: center;
        color: #082116;
        background: linear-gradient(135deg, #b6fac8, #4bd98f);
        font-weight: 950;
      }

      h1 {
        margin: 0;
        font-size: 1.9rem;
        line-height: 1;
      }

      p {
        margin: 1rem 0 0;
        color: #c3c7c6;
        line-height: 1.6;
      }

      .note {
        margin-top: 1rem;
        padding: 0.82rem;
        border: 1px solid rgba(75, 217, 143, 0.2);
        border-radius: 0.9rem;
        color: #b7f3ce;
        background: rgba(75, 217, 143, 0.08);
        font-size: 0.88rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="mark">M</div>
        <strong>MarketOS</strong>
      </div>
      <h1>You are offline.</h1>
      <p>MarketOS is installed on this phone, but records still need an internet connection in this version.</p>
      <p class="note">No wallet - records only. Money stays with your bank, POS, transfer, or cash drawer.</p>
    </main>
  </body>
</html>
